<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">

<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
<stop offset="0%" stop-color="#38bdf8"></stop>
<stop offset="100%" stop-color="#6366f1"></stop>
</linearGradient>
</defs>

<!-- background -->
<rect width="512" height="512" rx="120" fill="url(#bg)"></rect>

<!-- vinyl -->
<circle cx="256" cy="256" r="170" fill="#0f172a"></circle>

<!-- grooves -->
<circle cx="256" cy="256" r="130" stroke="#334155" stroke-width="8" fill="none"></circle>
<circle cx="256" cy="256" r="95" stroke="#334155" stroke-width="8" fill="none"></circle>
<circle cx="256" cy="256" r="60" stroke="#334155" stroke-width="8" fill="none"></circle>

<!-- center -->
<circle cx="256" cy="256" r="18" fill="#cbd5f5"></circle>

<!-- soundwave -->
<g fill="#38bdf8">
<rect x="380" y="210" width="12" height="90" rx="4"></rect>
<rect x="400" y="190" width="12" height="130" rx="4"></rect>
<rect x="420" y="220" width="12" height="70" rx="4"></rect>
</g>

</svg>